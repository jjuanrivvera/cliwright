# .goreleaser.yaml — copied into a generated CLI by cliwright (GOAL.md §5).
# Replace __BINARY__ / __OWNER__ / __REPO__. Run `goreleaser check` in CI (not only at tag).
version: 2

before:
  hooks: [go mod tidy, ./scripts/completions.sh]

builds:
  - id: __BINARY__
    main: ./cmd/__BINARY__
    binary: __BINARY__
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - { goos: windows, goarch: arm64 }
    ldflags:
      - -s -w
      - -X {{ .ModulePath }}/internal/version.Version={{ .Version }}
      - -X {{ .ModulePath }}/internal/version.Commit={{ .Commit }}
      - -X {{ .ModulePath }}/internal/version.Date={{ .Date }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - { goos: windows, formats: [zip] }
    files: [README.md, LICENSE, completions/*]

checksum: { name_template: checksums.txt }

# Homebrew: use homebrew_casks (NOT the deprecated brews:). The cask is __BINARY__-cli,
# but the binary inside the archive is __BINARY__ — so `binaries:` (plural list) is required,
# and an unsigned arm64 binary is SIGKILL'd by Gatekeeper without the xattr postflight.
homebrew_casks:
  - name: __BINARY__-cli
    binaries: [__BINARY__]
    repository: { owner: __OWNER__, name: homebrew-__REPO__ }
    homepage: https://github.com/__OWNER__/__REPO__
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/__BINARY__"]

scoops:
  - repository: { owner: __OWNER__, name: scoop-__REPO__ }   # this bucket repo must already exist

nfpms:
  - formats: [deb, rpm, apk]
    bindir: /usr/bin
    maintainer: __OWNER__
    contents:
      - { src: completions/__BINARY__.bash, dst: /usr/share/bash-completion/completions/__BINARY__ }
      - { src: completions/__BINARY__.zsh,  dst: /usr/share/zsh/site-functions/___BINARY__ }
      - { src: completions/__BINARY__.fish, dst: /usr/share/fish/vendor_completions.d/__BINARY__.fish }

sboms:
  - artifacts: archive          # syft SBOMs

signs:                          # cosign keyless (needs CI OIDC: permissions id-token: write)
  - cmd: cosign
    artifacts: checksum
    output: true
    args: ["sign-blob", "--yes", "--output-signature=${signature}", "--output-certificate=${certificate}", "${artifact}"]

changelog:
  groups:
    - { title: Features, regexp: '^.*?feat(\(.+\))??!?:.+$', order: 0 }
    - { title: Fixes, regexp: '^.*?fix(\(.+\))??!?:.+$', order: 1 }
    - { title: Performance, regexp: '^.*?perf(\(.+\))??!?:.+$', order: 2 }
  filters:
    exclude: ['^docs:', '^test:', '^chore:', '^ci:', merge conflict, Merge pull request, Merge branch]
