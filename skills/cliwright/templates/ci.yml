# .github/workflows/ci.yml — copied into a generated CLI by cliwright (GOAL.md §6).
#
# Two traps, each paid for once:
#   1. go-version-file: go.mod (NOT go-version: stable). `stable` grabs the newest Go, so
#      govulncheck runs against an already-patched stdlib and stays GREEN even when the module's
#      declared toolchain floor is behind — a real stdlib CVE hides. Reading the floor from go.mod
#      makes CI test what users actually build, and go red when the floor needs a bump. Keep the
#      go.mod `go`/`toolchain` directive current (that's what gets tested and shipped).
#   2. Build the linters/scanners (golangci-lint, gosec, govulncheck) FROM SOURCE with this job's
#      Go via `go install ...@latest` — do NOT pin them and do NOT lean on the prebuilt
#      golangci-lint-action / gosec ACTION. The prebuilt binaries lag the Go toolchain (they target
#      an older Go and can't analyze a module already on the next Go release, e.g. a go1.25 module
#      under a Go-1.24 scanner → "configuration contains invalid elements"). @latest always matches.
name: CI
on:
  push: { branches: [main, develop] }
  pull_request:

permissions: { contents: read }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - name: golangci-lint
        # Built from source with this job's Go (not golangci-lint-action) so the linter's Go
        # toolchain always matches the module — the prebuilt action lags and rejects a module
        # on a newer Go ("configuration contains invalid elements"). Also avoids the action's
        # incompatible config-verify wrapper.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...
      - name: docs-gen drift check
        run: make docs-gen && git diff --exit-code -- docs/commands

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (high-severity gate)
        # Built from source with this job's Go for the same reason as golangci-lint above:
        # the pinned prebuilt action lags the toolchain and can't parse a module on a newer Go.
        # @latest compiled here always matches the module's Go. Standalone gosec honors
        # `#nosec Gxxx` (not golangci's `//nolint:gosec`); for a CLI suppress the known
        # false-positives (G404 non-crypto jitter RNG, G304/G703 user --out/input paths).
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity high -confidence medium ./...

  test:
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      # Add -coverpkg=./... here if coverage relies on cross-package integration tests (e.g. a
      # commands_test that drives internal/api); without it those tests don't credit the code they
      # exercise and the gate under-reports. Keep the same flag in the Makefile so local == CI.
      - run: go test -race ./... -coverprofile=coverage.out
      - name: coverage gate (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/cover-check.sh 80
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: check }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: release --snapshot --clean --skip=sign,sbom,docker }
