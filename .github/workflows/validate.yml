name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install validator dependency
        run: pip install jsonschema
      - name: Validate .claude-plugin manifests
        run: python3 scripts/validate-plugin.py
